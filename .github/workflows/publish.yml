name: Publish Notebook to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert pypdf pandas numpy matplotlib seaborn scipy scikit-learn

      - name: Execute and convert notebook
        run: |
          jupyter nbconvert \
            --to html \
            --execute \
            --ExecutePreprocessor.timeout=1800 \
            --output index.html \
            checkpoint3_skeleton.ipynb
          # NOTE: rename the input file above to match your final notebook name once
          # you replace checkpoint3_skeleton.ipynb with your finished notebook.
          #
          # The notebook downloads rows.json (~1 GB) from the NYC Open Data API
          # at runtime rather than reading a committed file, so the timeout is
          # generous (30 min) to cover the download + full pipeline execution.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # serves the whole repo root; index.html is the entry point

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
